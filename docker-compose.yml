version: "3.9"

services:
  aain:
    build: .
    ports:
      - "8000:8000"
    environment:
      - AAIN_LOG_LEVEL=INFO
      - AAIN_LLM_PROVIDER=mock
      - AAIN_API_HOST=0.0.0.0
      - AAIN_API_PORT=8000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
